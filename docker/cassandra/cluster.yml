# Cassandra 3-Node Cluster Lab (Near-Production)
# Based on: https://cassandra.apache.org/doc/latest/cassandra/getting-started/configcassandra.html
# Gossip-based peer-to-peer, RF=3, tunable consistency
# Proves: Linear horizontal scaling, no single point of failure

services:
  cassandra-seed:
    image: cassandra:4.1
    container_name: cassandra-seed
    environment:
      CASSANDRA_CLUSTER_NAME: bench-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_NUM_TOKENS: 128
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-seed-data:/var/lib/cassandra
    ports:
      - "9042:9042"
      - "7199:7199"
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1"
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - cassandra-cluster-net

  cassandra-node2:
    image: cassandra:4.1
    container_name: cassandra-node2
    environment:
      CASSANDRA_CLUSTER_NAME: bench-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack2
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-seed
      CASSANDRA_NUM_TOKENS: 128
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-node2-data:/var/lib/cassandra
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1"
    depends_on:
      cassandra-seed:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - cassandra-cluster-net

  cassandra-node3:
    image: cassandra:4.1
    container_name: cassandra-node3
    environment:
      CASSANDRA_CLUSTER_NAME: bench-cluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack3
      CASSANDRA_ENDPOINT_SNITCH: GossipingPropertyFileSnitch
      CASSANDRA_SEEDS: cassandra-seed
      CASSANDRA_NUM_TOKENS: 128
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    volumes:
      - cassandra-node3-data:/var/lib/cassandra
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "1"
    depends_on:
      cassandra-node2:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep -q UN"]
      interval: 15s
      timeout: 10s
      retries: 20
      start_period: 90s
    networks:
      - cassandra-cluster-net

volumes:
  cassandra-seed-data:
  cassandra-node2-data:
  cassandra-node3-data:

networks:
  cassandra-cluster-net:
    driver: bridge
