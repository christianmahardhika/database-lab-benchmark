# PostgreSQL Streaming Replication (Primary + Standby)
# Based on: https://www.postgresql.org/docs/current/warm-standby.html

services:
  postgres-primary:
    image: postgres:17-alpine
    container_name: bench-postgres-primary
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: benchmark
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data
      - ./init-primary.sh:/docker-entrypoint-initdb.d/init-primary.sh
    command: >
      postgres
      -c wal_level=replica
      -c max_wal_senders=3
      -c max_replication_slots=3
      -c hot_standby=on
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-standby:
    image: postgres:17-alpine
    container_name: bench-postgres-standby
    environment:
      PGUSER: replicator
      PGPASSWORD: replicator
    ports:
      - "5433:5432"
    volumes:
      - postgres_standby_data:/var/lib/postgresql/data
    command: >
      bash -c "
        until pg_basebackup -h postgres-primary -D /var/lib/postgresql/data -U replicator -Fp -Xs -P -R; do
          echo 'Waiting for primary...';
          sleep 5;
        done;
        chmod 700 /var/lib/postgresql/data;
        postgres
      "
    depends_on:
      postgres-primary:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

volumes:
  postgres_primary_data:
  postgres_standby_data:
