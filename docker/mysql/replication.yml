# MySQL Source-Replica Replication
# Based on: https://dev.mysql.com/doc/refman/8.0/en/replication.html

services:
  mysql-source:
    image: mysql:8.0
    container_name: bench-mysql-source
    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_USER: bench
      MYSQL_PASSWORD: bench
      MYSQL_DATABASE: benchmark
    ports:
      - "3306:3306"
    volumes:
      - mysql_source_data:/var/lib/mysql
      - ./init-source.sql:/docker-entrypoint-initdb.d/init-source.sql
    command: >
      --server-id=1
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --innodb-buffer-pool-size=512M
      --max-connections=200
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ubench", "-pbench"]
      interval: 5s
      timeout: 5s
      retries: 10

  mysql-replica:
    image: mysql:8.0
    container_name: bench-mysql-replica
    environment:
      MYSQL_ROOT_PASSWORD: bench
      MYSQL_USER: bench
      MYSQL_PASSWORD: bench
    ports:
      - "3307:3306"
    volumes:
      - mysql_replica_data:/var/lib/mysql
      - ./init-replica.sql:/docker-entrypoint-initdb.d/init-replica.sql
    command: >
      --server-id=2
      --log-bin=mysql-bin
      --binlog-format=ROW
      --gtid-mode=ON
      --enforce-gtid-consistency=ON
      --read-only=ON
      --super-read-only=ON
      --innodb-buffer-pool-size=512M
    depends_on:
      mysql-source:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

volumes:
  mysql_source_data:
  mysql_replica_data:

