# MySQL Group Replication Lab (Multi-Primary)
# GR config via SQL after startup (can't set during init)

services:
  mysql-gr-1:
    image: mysql:8.0
    container_name: mysql-gr-1
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: testdb
    command:
      - --server-id=1
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
      - --binlog-checksum=NONE
      - --report-host=mysql-gr-1
    volumes:
      - mysql-gr-1-data:/var/lib/mysql
    ports:
      - "3310:3306"
    networks:
      - mysql-gr-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpass"]
      interval: 5s
      timeout: 5s
      retries: 20

  mysql-gr-2:
    image: mysql:8.0
    container_name: mysql-gr-2
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    command:
      - --server-id=2
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
      - --binlog-checksum=NONE
      - --report-host=mysql-gr-2
    volumes:
      - mysql-gr-2-data:/var/lib/mysql
    ports:
      - "3311:3306"
    depends_on:
      mysql-gr-1:
        condition: service_healthy
    networks:
      - mysql-gr-net

  mysql-gr-3:
    image: mysql:8.0
    container_name: mysql-gr-3
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
    command:
      - --server-id=3
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --gtid-mode=ON
      - --enforce-gtid-consistency=ON
      - --log-replica-updates=ON
      - --binlog-checksum=NONE
      - --report-host=mysql-gr-3
    volumes:
      - mysql-gr-3-data:/var/lib/mysql
    ports:
      - "3312:3306"
    depends_on:
      mysql-gr-1:
        condition: service_healthy
    networks:
      - mysql-gr-net

volumes:
  mysql-gr-1-data:
  mysql-gr-2-data:
  mysql-gr-3-data:

networks:
  mysql-gr-net:
    driver: bridge
