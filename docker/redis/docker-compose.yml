version: '3.8'

services:
  redis:
    image: redis:8-alpine
    container_name: bench-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --appendonly no
      --save ""
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: '2'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
