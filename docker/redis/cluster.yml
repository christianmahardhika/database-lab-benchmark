# Redis Cluster Lab (Horizontal Scaling)
# Based on: https://redis.io/docs/management/scaling/
# 6 nodes: 3 masters + 3 replicas for hash slot distribution

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-cluster-1
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    volumes:
      - redis-cluster-1:/data
    ports:
      - "7001:6379"
    networks:
      - redis-cluster-net

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-cluster-2
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    volumes:
      - redis-cluster-2:/data
    ports:
      - "7002:6379"
    networks:
      - redis-cluster-net

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-cluster-3
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    volumes:
      - redis-cluster-3:/data
    ports:
      - "7003:6379"
    networks:
      - redis-cluster-net

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-cluster-4
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    volumes:
      - redis-cluster-4:/data
    ports:
      - "7004:6379"
    networks:
      - redis-cluster-net

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-cluster-5
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    volumes:
      - redis-cluster-5:/data
    ports:
      - "7005:6379"
    networks:
      - redis-cluster-net

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-cluster-6
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    volumes:
      - redis-cluster-6:/data
    ports:
      - "7006:6379"
    networks:
      - redis-cluster-net

volumes:
  redis-cluster-1:
  redis-cluster-2:
  redis-cluster-3:
  redis-cluster-4:
  redis-cluster-5:
  redis-cluster-6:

networks:
  redis-cluster-net:
    driver: bridge
