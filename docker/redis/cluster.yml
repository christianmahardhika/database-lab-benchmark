# Redis Cluster (6 nodes: 3 masters + 3 replicas)
# Based on: https://redis.io/docs/management/scaling/

services:
  redis-node-1:
    image: redis:7-alpine
    container_name: redis-node-1
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7001:6379"
      - "17001:16379"
    volumes:
      - redis_node1_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis-node-2:
    image: redis:7-alpine
    container_name: redis-node-2
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7002:6379"
      - "17002:16379"
    volumes:
      - redis_node2_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis-node-3:
    image: redis:7-alpine
    container_name: redis-node-3
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7003:6379"
      - "17003:16379"
    volumes:
      - redis_node3_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis-node-4:
    image: redis:7-alpine
    container_name: redis-node-4
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7004:6379"
      - "17004:16379"
    volumes:
      - redis_node4_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis-node-5:
    image: redis:7-alpine
    container_name: redis-node-5
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7005:6379"
      - "17005:16379"
    volumes:
      - redis_node5_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis-node-6:
    image: redis:7-alpine
    container_name: redis-node-6
    command: redis-server --cluster-enabled yes --cluster-config-file nodes.conf --cluster-node-timeout 5000 --appendonly yes --port 6379
    ports:
      - "7006:6379"
      - "17006:16379"
    volumes:
      - redis_node6_data:/data
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  redis-cluster-init:
    image: redis:7-alpine
    container_name: redis-cluster-init
    depends_on:
      - redis-node-1
      - redis-node-2
      - redis-node-3
      - redis-node-4
      - redis-node-5
      - redis-node-6
    command: >
      sh -c "
        sleep 10;
        redis-cli --cluster create
          redis-node-1:6379
          redis-node-2:6379
          redis-node-3:6379
          redis-node-4:6379
          redis-node-5:6379
          redis-node-6:6379
          --cluster-replicas 1 --cluster-yes
      "
    restart: "no"

volumes:
  redis_node1_data:
  redis_node2_data:
  redis_node3_data:
  redis_node4_data:
  redis_node5_data:
  redis_node6_data:
