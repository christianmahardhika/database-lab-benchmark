services:
  cockroach:
    image: cockroachdb/cockroach:v24.3.0
    container_name: bench-cockroach
    command: start-single-node --insecure --store=attrs=ssd,path=/cockroach/cockroach-data
    ports:
      - "26257:26257" # SQL
      - "8081:8080" # Admin UI
    volumes:
      - cockroach_data:/cockroach/cockroach-data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cockroach_data:
