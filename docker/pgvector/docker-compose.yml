# pgvector (PostgreSQL + Vector Extension) Benchmark Lab
# Based on: https://github.com/pgvector/pgvector
# Uses pgvector Docker image which has the extension pre-installed
# Proves: Vector search inside PostgreSQL, no separate infrastructure

services:
  pgvector:
    image: pgvector/pgvector:pg17
    container_name: bench-pgvector
    environment:
      POSTGRES_USER: bench
      POSTGRES_PASSWORD: bench
      POSTGRES_DB: benchmark
    ports:
      - "5434:5432"  # Offset to avoid conflict with vanilla Postgres
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=512MB
      -c effective_cache_size=1536MB
      -c work_mem=256MB
      -c maintenance_work_mem=512MB
      -c max_parallel_workers_per_gather=2
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bench -d benchmark"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgvector_data:
