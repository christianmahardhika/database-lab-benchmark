# MongoDB Sharded Cluster (2 shards + config servers + mongos)
# Based on: https://www.mongodb.com/docs/manual/sharding/

services:
  # Config Server Replica Set
  configsvr1:
    image: mongo:8.0
    container_name: bench-configsvr1
    command: mongod --configsvr --replSet configrs --bind_ip_all --port 27019
    volumes:
      - configsvr1_data:/data/configdb
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  configsvr2:
    image: mongo:8.0
    container_name: bench-configsvr2
    command: mongod --configsvr --replSet configrs --bind_ip_all --port 27019
    volumes:
      - configsvr2_data:/data/configdb
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  configsvr3:
    image: mongo:8.0
    container_name: bench-configsvr3
    command: mongod --configsvr --replSet configrs --bind_ip_all --port 27019
    volumes:
      - configsvr3_data:/data/configdb
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  # Shard 1 (single node for simplicity)
  shard1:
    image: mongo:8.0
    container_name: bench-shard1
    command: mongod --shardsvr --replSet shard1rs --bind_ip_all --port 27018
    volumes:
      - shard1_data:/data/db
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  # Shard 2 (single node for simplicity)
  shard2:
    image: mongo:8.0
    container_name: bench-shard2
    command: mongod --shardsvr --replSet shard2rs --bind_ip_all --port 27018
    volumes:
      - shard2_data:/data/db
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  # Mongos Router
  mongos:
    image: mongo:8.0
    container_name: bench-mongos
    command: mongos --configdb configrs/configsvr1:27019,configsvr2:27019,configsvr3:27019 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    depends_on:
      - configsvr1
      - configsvr2
      - configsvr3
      - shard1
      - shard2
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

  # Initialization container
  mongo-init:
    image: mongo:8.0
    container_name: mongo-shard-init
    depends_on:
      - mongos
    command: >
      bash -c "
        sleep 30;
        mongosh --host configsvr1:27019 --eval 'rs.initiate({_id:\"configrs\",configsvr:true,members:[{_id:0,host:\"configsvr1:27019\"},{_id:1,host:\"configsvr2:27019\"},{_id:2,host:\"configsvr3:27019\"}]})';
        sleep 5;
        mongosh --host shard1:27018 --eval 'rs.initiate({_id:\"shard1rs\",members:[{_id:0,host:\"shard1:27018\"}]})';
        mongosh --host shard2:27018 --eval 'rs.initiate({_id:\"shard2rs\",members:[{_id:0,host:\"shard2:27018\"}]})';
        sleep 10;
        mongosh --host mongos:27017 --eval 'sh.addShard(\"shard1rs/shard1:27018\")';
        mongosh --host mongos:27017 --eval 'sh.addShard(\"shard2rs/shard2:27018\")';
        echo 'Sharding setup complete';
      "
    restart: "no"

volumes:
  configsvr1_data:
  configsvr2_data:
  configsvr3_data:
  shard1_data:
  shard2_data:
