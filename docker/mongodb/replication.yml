# MongoDB Replica Set (3-node)
# Based on: https://www.mongodb.com/docs/manual/replication/

services:
  mongo1:
    image: mongo:8.0
    container_name: bench-mongo1
    command: mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    environment:
      MONGO_INITDB_ROOT_USERNAME: bench
      MONGO_INITDB_ROOT_PASSWORD: bench
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo2:
    image: mongo:8.0
    container_name: bench-mongo2
    command: mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    ports:
      - "27018:27017"
    volumes:
      - mongo2_data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    depends_on:
      - mongo1

  mongo3:
    image: mongo:8.0
    container_name: bench-mongo3
    command: mongod --replSet rs0 --bind_ip_all --keyFile /etc/mongo-keyfile
    ports:
      - "27019:27017"
    volumes:
      - mongo3_data:/data/db
      - ./mongo-keyfile:/etc/mongo-keyfile:ro
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    depends_on:
      - mongo1

  mongo-init:
    image: mongo:8.0
    container_name: mongo-init
    depends_on:
      mongo1:
        condition: service_healthy
    command: >
      mongosh --host mongo1 -u bench -p bench --authenticationDatabase admin --eval '
        rs.initiate({
          _id: "rs0",
          members: [
            { _id: 0, host: "mongo1:27017", priority: 2 },
            { _id: 1, host: "mongo2:27017", priority: 1 },
            { _id: 2, host: "mongo3:27017", priority: 1 }
          ]
        })
      '
    restart: "no"

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
