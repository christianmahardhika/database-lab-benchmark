# MongoDB Replica Set Lab
# Based on: https://www.mongodb.com/docs/manual/replication/

services:
  mongo1:
    image: mongo:7.0
    container_name: mongo1
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - mongo1-data:/data/db
    ports:
      - "27017:27017"
    networks:
      - mongo-net

  mongo2:
    image: mongo:7.0
    container_name: mongo2
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - mongo2-data:/data/db
    ports:
      - "27018:27017"
    networks:
      - mongo-net

  mongo3:
    image: mongo:7.0
    container_name: mongo3
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    volumes:
      - mongo3-data:/data/db
    ports:
      - "27019:27017"
    networks:
      - mongo-net

volumes:
  mongo1-data:
  mongo2-data:
  mongo3-data:

networks:
  mongo-net:
    driver: bridge
