# LSM-Tree Database Benchmark Lab
# ScyllaDB (Cassandra-compatible, C++ based) + RocksDB via TiKV

version: '3.8'

services:
  # ScyllaDB - LSM-tree, Cassandra-compatible but 10x faster
  scylla-1:
    image: scylladb/scylla:5.4
    container_name: scylla-1
    command: --seeds=scylla-1 --smp 2 --memory 1G --overprovisioned 1 --api-address 0.0.0.0
    ports:
      - "9043:9042"  # CQL (avoid conflict with Cassandra 9042)
      - "9180:9180"  # Prometheus metrics
    volumes:
      - scylla1_data:/var/lib/scylla
    networks:
      - lsm-net
    healthcheck:
      test: ["CMD", "cqlsh", "-e", "describe cluster"]
      interval: 30s
      timeout: 10s
      retries: 10

  scylla-2:
    image: scylladb/scylla:5.4
    container_name: scylla-2
    command: --seeds=scylla-1 --smp 2 --memory 1G --overprovisioned 1 --api-address 0.0.0.0
    volumes:
      - scylla2_data:/var/lib/scylla
    networks:
      - lsm-net
    depends_on:
      scylla-1:
        condition: service_healthy

  # TiKV - RocksDB-based distributed KV store
  # Simpler than raw RocksDB, provides network interface
  pd:
    image: pingcap/pd:v7.5.0
    container_name: pd-tikv
    ports:
      - "2389:2379"
    command:
      - --name=pd
      - --client-urls=http://0.0.0.0:2379
      - --peer-urls=http://0.0.0.0:2380
      - --advertise-client-urls=http://pd:2379
      - --advertise-peer-urls=http://pd:2380
      - --data-dir=/data/pd
    volumes:
      - pd_data:/data
    networks:
      - lsm-net

  tikv:
    image: pingcap/tikv:v7.5.0
    container_name: tikv
    ports:
      - "20160:20160"
    command:
      - --addr=0.0.0.0:20160
      - --advertise-addr=tikv:20160
      - --pd=pd:2379
      - --data-dir=/data/tikv
    volumes:
      - tikv_data:/data
    networks:
      - lsm-net
    depends_on:
      - pd

volumes:
  scylla1_data:
  scylla2_data:
  pd_data:
  tikv_data:

networks:
  lsm-net:
    driver: bridge
